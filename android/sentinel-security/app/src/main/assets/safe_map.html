<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; }
body { background: #0F131F; overflow: hidden; }
#map { width: 100vw; height: 100vh; background: #0F131F; }
.leaflet-control-zoom a { background: #1B1F2C; color: #DFE2F3; border-color: #313442; }
.leaflet-control-zoom { border: none; }
</style>
</head>
<body>
<div id="map"></div>
<script>
var map = L.map('map', {
    zoomControl: true,
    attributionControl: false,
    dragging: true,
    scrollWheelZoom: true,
    zoom: 16
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: ''
}).addTo(map);

var marker = null, circle = null;
var currentLat = 23.8103, currentLng = 90.4125, currentRadius = 50;

function setLocation(lat, lng, radius) {
    currentLat = lat; currentLng = lng; currentRadius = radius;
    if (marker) map.removeLayer(marker);
    if (circle) map.removeLayer(circle);
    marker = L.marker([lat, lng], {
        draggable: true,
        autoPan: true
    }).addTo(map);
    circle = L.circle([lat, lng], {
        radius: radius,
        color: '#2E5BFF',
        fillColor: '#2E5BFF',
        fillOpacity: 0.2,
        weight: 2,
        dashArray: '5, 5'
    }).addTo(map);
    map.setView([lat, lng], 16);

    marker.on('dragend', function() {
        var pos = marker.getLatLng();
        currentLat = Math.round(pos.lat * 10000) / 10000;
        currentLng = Math.round(pos.lng * 10000) / 10000;
        circle.setLatLng([currentLat, currentLng]);
        notifyAndroid(currentLat, currentLng);
    });
}

function updateRadius(radius) {
    currentRadius = radius;
    if (circle) circle.setRadius(radius);
}

function getLocation() {
    return JSON.stringify({ lat: currentLat, lng: currentLng, radius: currentRadius });
}

map.on('click', function(e) {
    currentLat = Math.round(e.latlng.lat * 10000) / 10000;
    currentLng = Math.round(e.latlng.lng * 10000) / 10000;
    if (marker) {
        marker.setLatLng([currentLat, currentLng]);
        circle.setLatLng([currentLat, currentLng]);
    } else {
        setLocation(currentLat, currentLng, currentRadius);
    }
    map.setView([currentLat, currentLng], 16, { animate: true });
    notifyAndroid(currentLat, currentLng);
});

function notifyAndroid(lat, lng) {
    try {
        if (window.AndroidBridge) {
            AndroidBridge.onLocationChanged(lat, lng);
        }
    } catch(e) {}
}
</script>
</body>
</html>
