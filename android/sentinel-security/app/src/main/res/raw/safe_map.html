<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; }
body { background: #171B28; overflow: hidden; }
#map { width: 100vw; height: 100vh; background: #171B28; }
</style>
</head>
<body>
<div id="map"></div>
<script>
var map = L.map('map', {
    zoomControl: false,
    attributionControl: false,
    dragging: true,
    scrollWheelZoom: true
});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19
}).addTo(map);

var marker = null, circle = null;
var currentLat = 0, currentLng = 0, currentRadius = 200;

function setLocation(lat, lng, radius) {
    currentLat = lat; currentLng = lng; currentRadius = radius;
    if (marker) map.removeLayer(marker);
    if (circle) map.removeLayer(circle);
    marker = L.marker([lat, lng], { draggable: true }).addTo(map);
    circle = L.circle([lat, lng], {
        radius: radius,
        color: '#2E5BFF',
        fillColor: '#2E5BFF',
        fillOpacity: 0.15,
        weight: 2
    }).addTo(map);
    map.setView([lat, lng], 15);
    marker.on('dragend', function(e) {
        var pos = marker.getLatLng();
        currentLat = pos.lat; currentLng = pos.lng;
        circle.setLatLng(pos);
        if (window.AndroidBridge) {
            AndroidBridge.onLocationChanged(pos.lat, pos.lng);
        }
    });
}

function updateMarker(lat, lng) {
    setLocation(lat, lng, currentRadius);
}

function updateRadius(radius) {
    currentRadius = radius;
    if (circle) circle.setRadius(radius);
}

map.on('click', function(e) {
    if (window.AndroidBridge) {
        AndroidBridge.onLocationChanged(e.latlng.lat, e.latlng.lng);
    }
});
</script>
</body>
</html>
